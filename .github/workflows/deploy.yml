name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Deploy to server
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.KEY }}
        # set -e: fail the run on any error. Previously a failed `git pull` was
        # masked by the final `nginx reload`, so broken deploys still showed green.
        # The server is a strict mirror of origin/main — fetch + reset --hard
        # instead of pull, so it can never diverge and silently block deploys.
        # NEVER commit on the server: local commits are discarded by reset --hard.
        script: |
          set -e
          git config --global --add safe.directory /var/www/dylanbay.dev
          cd /var/www/dylanbay.dev
          git fetch origin main
          git reset --hard origin/main
          chown -R www-data:www-data /var/www/dylanbay.dev
          systemctl reload nginx

    # Purge Cloudflare's edge cache so changed assets (e.g. style.css, which is
    # linked versionless) can never be served stale after a deploy. Without this,
    # an edge node keeps the old file until its TTL expires — the failure mode
    # that left the dark-mode toggle + ASCII background broken behind a stale CSS.
    - name: Purge Cloudflare cache
      run: |
        resp=$(curl -sS -X POST \
          "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}')
        echo "$resp"
        echo "$resp" | grep -q '"success":true'
